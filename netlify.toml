# Netlify configuration for STA-CRM 6.0 - optimized for Next.js

# Base build settings
[build]
  command = "npm run build"
  publish = ".next"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':!server/'"

# Next.js-specific settings
[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "20"
  NPM_VERSION = "10"

# Server functions
[functions]
  directory = ".netlify/functions/"
  node_bundler = "esbuild"
  included_files = ["server/src/**"]

# API endpoints - proxy to functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Next.js Image proxy config
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Production environment specific settings
[context.production]
  environment = { NODE_ENV = "production", NEXT_PUBLIC_SITE_ENV = "production" }

# Staging branch settings (deploy preview + branch deploy)
[context.staging]
  environment = { NODE_ENV = "production", NEXT_PUBLIC_SITE_ENV = "staging" }

# Development branch settings
[context.development]
  environment = { NODE_ENV = "production", NEXT_PUBLIC_SITE_ENV = "development" }

# Deploy preview settings (specific to PR reviews)
[context.deploy-preview]
  environment = { NODE_ENV = "production", NEXT_PUBLIC_SITE_ENV = "staging" }

# Handle SPA routing for Next.js
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Next.js specific headers
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable" 