cat > docker-compose.yml << 'EOL'
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: stacrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres  # Use a strong password in production
      POSTGRES_DB: stacrm
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: stacrm-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/stacrm
      PGUSER: postgres
      PGHOST: postgres
      PGPASSWORD: postgres
      PGDATABASE: stacrm
      PGPORT: 5432
      JWT_SECRET: 
      JWT_EXPIRES_IN: 1d
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/uploads

  # Frontend Next.js
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: stacrm-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://164.90.177.106:5000/api
      NEXT_PUBLIC_SITE_URL: http://164.90.177.106
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # Nginx Reverse Proxy
  nginx:
    image: nginx:stable
    container_name: stacrm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"  # Uncomment for SSL
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      # - ./ssl:/etc/nginx/ssl  # Uncomment for SSL
    depends_on:
      - frontend
      - backend

volumes:
  postgres-data:
EOL